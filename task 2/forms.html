<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>forms.html</title>
</head>
<body>
    <h1>forms in HTML</h1>
    <form action="resume.html">

        <label for="title">Enter title:</label><input type="text" id="title" value="Mr" required><br>
        <label for="name">Enter first name:</label> <input id="name" type="text"  minlength="2" maxlength="20" placeholder="Enter first name" >
        <label for="last-name">Enter last name:</label><input id="last-name" type="text"  minlength="2" maxlength="20" placeholder="Enter last name" ><br>
        <label for="age">Enter age:</label><input id="age" type="number" min="0" placeholder="Enter age" ><br>
        <label for="email">Enter email:</label><input id="email" type="email" placeholder="Enter email" ><br>
        <label for="password">Enter password:</label><input id="password" type="password" placeholder="Enter password" ><br>
        <label for="dob">Enter your date of birth:</label><input id="dob" type="date" ><br>
        <label for="">enter the size of ur shirt:</label>
        <label for="M">M</label>,<input type="radio" name="shirt size" id="M" value="m"  checked>
        <label for="L">L</label>,<input type="radio" name="shirt size" id="L" value="l" >
        <label for="XL">XL</label>,<input type="radio" name="shirt size" id="XL" value="xl" >
        <label for="XXL">XXL</label>,<input type="radio" name="shirt size" id="XXL" value="xxl" ><br>
        <p>Enter ur preffered language:</p>
        <label for="English">English</label><input type="checkbox" id="English" checked>
        <label for="Hindi">Hindi</label><input type="checkbox" id="Hindi" >
        <label for="Odia">Odia</label><input type="checkbox" id="Odia" ><br>
        <label for="color">Enter the color of your shirt:</label><input id="color" type="color" > <br>
        <label for="file">Upload your resume:</label><input id="file" type="file" ><br>
        <label for="range">Enter your experience in years:</label><input id="range" type="range" min="0" max="100"  ><br>
        <label for="url">Enter your website url:</label><input id="url" type="url" placeholder="Enter website URL" ><br>
        <label for="tel">Enter your phone number:</label><input id="tel" type="tel" placeholder="Enter phone number" ><br>
        <label for="payment">Select a payment method:</label>
        <select id="payment" >
            <option value="">Select a payment method</option>
            <option value="credit-card">Credit Card</option>
            <option value="debit-card">Debit Card</option>
            <option value="paypal">PayPal</option>
            <option value="net-banking">Net Banking</option>
        </select><br>
        <label for="n">are u not interested in any of these?</label><input id="n" type="checkbox " disabled><br>
        <label for="f">Pls give your feedback:</label><textarea id="f"  rows="20" cols="60" placeholder="give us ur valuable feedback" required></textarea><br> <br>
            <input type="submit" value="Submit">
            <input type="reset" value="Reset">

    </form> 
</body>
</html>
